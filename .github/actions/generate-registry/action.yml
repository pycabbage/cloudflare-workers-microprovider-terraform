name: 'Generate registry site'
description: 'Generate a static Terraform provider registry protocol site from GitHub Releases'

inputs:
  namespace:
    description: 'Provider namespace (e.g. pycabbage)'
    required: true
  provider-type:
    description: 'Provider type (e.g. cloudflare-workers-microprovider)'
    required: true
  public-key-file:
    description: 'Path to the ASCII-armored GPG public key file (must already be committed to the repository)'
    required: true
  output-dir:
    description: 'Output directory for the generated registry site'
    required: true
  github-token:
    description: 'Token used to call the GitHub API (to list releases)'
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Check public key file
      shell: bash
      env:
        PUBLIC_KEY_FILE: ${{ inputs.public-key-file }}
      run: |
        if [ ! -f "$PUBLIC_KEY_FILE" ]; then
          echo "::error::${PUBLIC_KEY_FILE} not found. gpg-public-key.asc has not been committed. See docs/registry/setup.md"
          exit 1
        fi

    - name: Extract GPG key ID
      id: key
      shell: bash
      env:
        PUBLIC_KEY_FILE: ${{ inputs.public-key-file }}
      run: |
        FINGERPRINT="$(gpg --show-keys --with-colons "$PUBLIC_KEY_FILE" | awk -F: '$1 == "fpr" { print $10; exit }')"
        if [ -z "$FINGERPRINT" ]; then
          echo "::error::Could not extract a GPG fingerprint from ${PUBLIC_KEY_FILE}"
          exit 1
        fi
        echo "key-id=${FINGERPRINT: -16}" >> "$GITHUB_OUTPUT"

    - name: Generate registry JSON
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        NAMESPACE: ${{ inputs.namespace }}
        PROVIDER_TYPE: ${{ inputs.provider-type }}
        PUBLIC_KEY_FILE: ${{ inputs.public-key-file }}
        KEY_ID: ${{ steps.key.outputs.key-id }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        go run ./internal/registry \
          -namespace "$NAMESPACE" \
          -type "$PROVIDER_TYPE" \
          -public-key-file "$PUBLIC_KEY_FILE" \
          -key-id "$KEY_ID" \
          -output "$OUTPUT_DIR"
